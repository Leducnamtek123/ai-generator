services:
  # PostgreSQL - Primary database
  postgres:
    container_name: ai-generator-postgres
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  # Redis - Cache, sessions, BullMQ
  redis:
    container_name: ai-generator-redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"

  # MinIO - S3-compatible object storage
  minio:
    container_name: ai-generator-minio
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  # MinIO bucket auto-creation
  minio-init:
    container_name: ai-generator-minio-init
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/ai-generator --ignore-existing;
      mc anonymous set public myminio/ai-generator;
      exit 0;
      "

  # Backend (NestJS API) - Core Engine with direct AI provider integration
  backend:
    container_name: ai-generator-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_HOST=postgres
      - WORKER_HOST=redis://redis:6379/1
      - REDIS_HOST=redis
      - AWS_S3_ENDPOINT=http://minio:9000
    depends_on:
      - postgres
      - redis
      - minio

  # Frontend (Next.js Website)
  frontend:
    container_name: ai-generator-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  postgres-data:
  minio-data:
