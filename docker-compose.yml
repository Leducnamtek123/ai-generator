services:
  # PostgreSQL - Primary database
  postgres:
    container_name: ai-generator-postgres
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  # Redis - Cache, sessions, BullMQ
  redis:
    container_name: ai-generator-redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"

  # MinIO - S3-compatible object storage
  minio:
    container_name: ai-generator-minio
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  # MinIO bucket auto-creation
  minio-init:
    container_name: ai-generator-minio-init
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/ai-generator --ignore-existing;
      mc anonymous set public myminio/ai-generator;
      exit 0;
      "

volumes:
  postgres-data:
  minio-data:
