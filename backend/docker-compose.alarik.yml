version: "3.8"

services:
  alarik:
    image: ghcr.io/achtungsoftware/alarik:latest # Predicted image name
    container_name: alarik
    ports:
      - "8080:8080"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      # Default credentials (change as needed)
      - ADMIN_USERNAME=alarik
      - ADMIN_PASSWORD=alarik
      - DEFAULT_ACCESS_KEY=AKIAIOSFODNN7EXAMPLE
      - DEFAULT_SECRET_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
    volumes:
      - alarik_data:/app/Storage
    networks:
      - app_network

volumes:
  alarik_data:

networks:
  app_network:
    external: true # Assumes your main app network
